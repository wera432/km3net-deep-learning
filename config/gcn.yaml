# =============================================================================
# gcn.yaml
# =============================================================================
# Graph Convolutional Network (Kipf & Welling). Merged on top of base.yaml --
# only the `model:` section differs; data (including graph.k/num_neighbors),
# training procedure, and loss are shared with every other model config.
#
# Run with:
#   python train.py --model-config configs/gcn.yaml
# =============================================================================

model:
  name: gcn
  hidden_dim: [128, 256]          # grid
  num_layers: 3                    # fixed -- see note below on why this isn't a grid axis
  dropout: [0.1, 0.2, 0.3]        # grid
  activation: leaky_relu           # fixed, carried over from the MLP winner
