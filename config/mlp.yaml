# =============================================================================
# mlp.yaml
# =============================================================================
# MLP baseline. Merged on top of base.yaml -- only the `model:` section
# differs; data, training procedure, and loss are shared with every other
# model config.
#
# Run with:
#   python train.py --model-config configs/mlp.yaml
# =============================================================================

model:
  name: mlp
  hidden_dim: 256
  num_layers: 4
  dropout: 0.2
  activation: leaky_relu

train:
  lr: 0.001